name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
      timezone: 'Asia/Shanghai'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check_source:
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.remote.outputs.source_sha }}
      should_deploy: ${{ steps.decision.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Read remote course source SHA
        id: remote
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getContent({
              owner: 'Favsum',
              repo: 'chinese-words',
              path: '现代汉语常用词表（第2版）.csv',
              ref: 'main',
            });

            if (Array.isArray(data) || !data.sha) {
              core.setFailed('Expected a file response with a SHA.');
              return;
            }

            core.setOutput('source_sha', data.sha);

      - name: Read last deployed source SHA
        id: state
        shell: bash
        run: |
          last_sha=''
          if [[ -f .github/course-source-sha.txt ]]; then
            last_sha="$(tr -d '\r\n' < .github/course-source-sha.txt)"
          fi

          echo "last_sha=$last_sha" >> "$GITHUB_OUTPUT"

      - name: Decide whether deployment is needed
        id: decision
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_SHA: ${{ steps.remote.outputs.source_sha }}
          LAST_SHA: ${{ steps.state.outputs.last_sha }}
        run: |
          should_deploy=false

          if [[ "$EVENT_NAME" == "push" ]]; then
            should_deploy=true
          elif [[ -z "$LAST_SHA" || "$SOURCE_SHA" != "$LAST_SHA" ]]; then
            should_deploy=true
          fi

          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "event=$EVENT_NAME"
          echo "source_sha=$SOURCE_SHA"
          echo "last_sha=$LAST_SHA"
          echo "should_deploy=$should_deploy"

  build:
    needs: check_source
    if: needs.check_source.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: needs.check_source.outputs.should_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: [check_source, build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  record_source_sha:
    needs: [check_source, deploy]
    if: needs.check_source.outputs.should_deploy == 'true' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Write deployed source SHA
        id: write_state
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.check_source.outputs.source_sha }}
        run: |
          printf '%s\n' "$SOURCE_SHA" > .github/course-source-sha.txt

          if git diff --quiet -- .github/course-source-sha.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated source SHA
        if: steps.write_state.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/course-source-sha.txt
          git commit -m "chore(actions): record deployed course source sha [skip ci]"
          git push origin HEAD:main
